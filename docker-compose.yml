version: '3.9'

# Redis removed — cache handled via Supabase cache table.

services:

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: aurum-backend
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - PYTHONIOENCODING=utf-8
      - PYTHONUTF8=1
    volumes:
      - ./backend:/app
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    container_name: aurum-frontend
    ports:
      - "3000:3000"
    env_file:
      - ./frontend/.env.local
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules
    restart: unless-stopped

  # ── Kronos-mini probabilistic forecast service ──────────────────────────
  # CPU-only PyTorch time-series model — separate from Railway backend
  kronos:
    build:
      context: ./kronos
      dockerfile: Dockerfile
    container_name: aurum-kronos
    ports:
      - "8090:8090"
    environment:
      - KRONOS_AUTH_TOKEN=${KRONOS_AUTH_TOKEN:-kronos-aurum-x-secret-change-this}
    restart: unless-stopped
    # First build downloads torch+Kronos weights — takes ~5 min, cached after
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8090/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 120s

  # ── ngrok permanent tunnel — exposes Kronos to Railway backend ───────────
  # Static domain: armoire-strategy-ibuprofen.ngrok-free.dev (free, permanent)
  # KRONOS_SERVICE_URL = https://armoire-strategy-ibuprofen.ngrok-free.dev
  kronos-tunnel:
    image: ngrok/ngrok:latest
    container_name: aurum-kronos-tunnel
    command: http kronos:8090 --domain=armoire-strategy-ibuprofen.ngrok-free.dev --log=stdout
    environment:
      - NGROK_AUTHTOKEN=${NGROK_AUTHTOKEN}
    depends_on:
      - kronos
    restart: unless-stopped
