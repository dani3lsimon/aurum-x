version: '3.9'

# Redis removed — cache handled via Supabase cache table.

services:

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: aurum-backend
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - PYTHONIOENCODING=utf-8
      - PYTHONUTF8=1
    volumes:
      - ./backend:/app
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    container_name: aurum-frontend
    ports:
      - "3000:3000"
    env_file:
      - ./frontend/.env.local
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules
    restart: unless-stopped
